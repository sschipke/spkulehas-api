name: Deploy Staging
on:
  push:
    branches:
      - develop
      - feature/*
      - bugfix/*
  workflow_dispatch:
    inputs:
      environment:
        type: string
        default: staging
        required: true
jobs:
  deploy:
    name: Deploy staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Run install and compile
        uses: borales/actions-yarn@v4
        with:
          cmd: corepack enable && yarn install && yarn compile

      - name: Deploy to fly.io
        uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy ./build --config ./flyEnv/fly.staging.toml --local-only -a spkulehas-api-staging
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
